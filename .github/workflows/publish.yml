name: Publish NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive Package Version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart('v')
          }
          else {
            throw "workflow_dispatch requires updating this workflow to provide an explicit version input."
          }
          "package_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build
        shell: pwsh
        run: dotnet run .\build.cs -- --target Build --configuration Release

      - name: Test
        shell: pwsh
        run: dotnet test .\src\Everything.Net.Tests\Everything.Net.Tests.csproj -c Release --no-build

      - name: Pack
        shell: pwsh
        run: |
          $env:PACKAGE_VERSION='${{ steps.version.outputs.package_version }}'
          dotnet run .\build.cs -- --target Pack --configuration Release

      - name: Publish
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: pwsh
        run: |
          $env:PACKAGE_VERSION='${{ steps.version.outputs.package_version }}'
          dotnet run .\build.cs -- --target Publish --configuration Release
