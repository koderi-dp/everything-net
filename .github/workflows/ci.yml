name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-pack:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        shell: pwsh
        run: dotnet run .\build.cs -- --target Build --configuration Release

      - name: Test
        shell: pwsh
        run: dotnet test .\src\Everything.Net.Tests\Everything.Net.Tests.csproj -c Release --no-build

      - name: Pack
        shell: pwsh
        run: dotnet run .\build.cs -- --target Pack --configuration Release

      - name: Upload NuGet Package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/nuget/*.nupkg
